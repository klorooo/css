<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card-accent"></div>
    <div class="card">
        <img class="avatar" src="kloro.jpg" alt="Kloro Morozov's Profile">
        <h1 class="name">Kloro Morozov</h1>
        <p class="role">Software Engineer</p>
        <p class="bio">I build clean interfaces and obsess over the details that make a product feel right.</p>
        <div class="socials">
            <a href="https://github.com/klorooo" class="social-link" aria-label="Github">GH</a>
            <a href="https://www.facebook.com/mico.presentacion" class="social-link" aria-label="Facebook">FB</a>
            <a href="https://www.instagram.com/miqueueri/" class="social-link" aria-label="Instagram">IG</a>
        </div>
    </div>
</body>

</html>
